<!DOCTYPE html>
<html lang="en" data-theme="midnight">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASIO fx-991ES PLUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="ambient"></div>
    
    <main>
        <section class="heading">
            <div class="brand-container">
                <p class="brand">CASIO</p>
                <p class="model">fx-991ES PLUS</p>
            </div>
            <div class="header-right">
                <p class="headingtext1">NATURAL-V.P.A.M.</p>
                <div class="header-row">
                    <p class="headingtext2">TWO WAY POWER</p>
                    <button id="theme-toggle" class="theme-btn" title="Change Theme">
                        <i class="icon-settings"></i>
                    </button>
                </div>
            </div>
            <div class="solar">
                <div></div><div></div><div></div><div></div>
            </div>
        </section>
        
        <div class="displayarea">
            <div class="display-container">
                <div class="status-bar">
                    <div class="status-indicators">
                        <span class="indicator shift" id="shift-indicator">S</span>
                        <span class="indicator alpha" id="alpha-indicator">A</span>
                    </div>
                    <div class="status-indicators">
                        <span class="indicator deg active" id="deg-indicator">D</span>
                        <span class="indicator rad" id="rad-indicator">R</span>
                        <span class="indicator" id="m-indicator">M</span>
                    </div>
                </div>
                <p id="casiotext">CASIO</p>
                <textarea class="display" id="display" readonly></textarea>
            </div>
        </div>

        <section class="buttonarea1">
            <button id="replay" class="btn">
                <span class="main-label">REPLAY</span>
            </button>
            <button class="btn button3" data-action="shift">
                <span class="main-label">SHIFT</span>
            </button>
            <button class="btn button3" data-action="alpha">
                <span class="main-label">ALPHA</span>
            </button>
            <button class="btn button3" data-action="mode">
                <span class="main-label">MODE</span>
            </button>
            <button class="btn button3" data-action="on">
                <span class="main-label">ON</span>
            </button>
            
            <button class="btn button1" data-action="calc">
                <span class="shift-label">SOLVE</span>
                <span class="main-label">CALC</span>
            </button>
            <button class="btn button1" data-action="integral">
                <span class="shift-label">d/dx</span>
                <span class="main-label">∫dx</span>
            </button>
            <button class="btn button1" data-action="x-1">
                <span class="shift-label">x!</span>
                <span class="alpha-label">A</span>
                <span class="main-label">x⁻¹</span>
            </button>
            <button class="btn button1" data-action="logbase">
                <span class="shift-label">√</span>
                <span class="alpha-label">B</span>
                <span class="main-label">logₐb</span>
            </button>
            <button class="btn button1" data-action="sqrt">
                <span class="shift-label">∛</span>
                <span class="alpha-label">C</span>
                <span class="main-label">√</span>
            </button>
            
            <button class="btn button1" data-action="square">
                <span class="shift-label">x³</span>
                <span class="alpha-label">D</span>
                <span class="main-label">x²</span>
            </button>
            <button class="btn button1" data-action="power">
                <span class="shift-label">x⁻¹</span>
                <span class="alpha-label">E</span>
                <span class="main-label">xʸ</span>
            </button>
            <button class="btn button1" data-action="log">
                <span class="shift-label">10ˣ</span>
                <span class="alpha-label">F</span>
                <span class="main-label">log</span>
            </button>
            <button class="btn button1" data-action="ln">
                <span class="shift-label">eˣ</span>
                <span class="alpha-label">G</span>
                <span class="main-label">ln</span>
            </button>
            <button class="btn button1" data-action="negate">
                <span class="shift-label">(-)</span>
                <span class="alpha-label">H</span>
                <span class="main-label">(−)</span>
            </button>
            
            <button class="btn button1" data-action="dms">
                <span class="shift-label">□°□'□"</span>
                <span class="alpha-label">I</span>
                <span class="main-label">°,'"</span>
            </button>
            <button class="btn button1" data-action="hyp">
                <span class="shift-label">□⁻¹</span>
                <span class="alpha-label">J</span>
                <span class="main-label">hyp</span>
            </button>
            <button class="btn button1" data-action="sin">
                <span class="shift-label">sin⁻¹</span>
                <span class="alpha-label">K</span>
                <span class="main-label">sin</span>
            </button>
            <button class="btn button1" data-action="cos">
                <span class="shift-label">cos⁻¹</span>
                <span class="alpha-label">L</span>
                <span class="main-label">cos</span>
            </button>
            <button class="btn button1" data-action="tan">
                <span class="shift-label">tan⁻¹</span>
                <span class="alpha-label">M</span>
                <span class="main-label">tan</span>
            </button>
            
            <button class="btn button1" data-action="rcl">
                <span class="shift-label">STO</span>
                <span class="main-label">RCL</span>
            </button>
            <button class="btn button1" data-action="eng">
                <span class="shift-label">Rnd</span>
                <span class="main-label">ENG</span>
            </button>
            <button class="btn button1" data-action="lparen">
                <span class="alpha-label">X</span>
                <span class="main-label">(</span>
            </button>
            <button class="btn button1" data-action="rparen">
                <span class="alpha-label">Y</span>
                <span class="main-label">)</span>
            </button>
            <button class="btn button1" data-action="sd">
                <span class="shift-label">▶DEC</span>
                <span class="main-label">S⇔D</span>
            </button>
            <button class="btn button1" data-action="mplus">
                <span class="shift-label">M−</span>
                <span class="main-label">M+</span>
            </button>
        </section>

        <section class="buttonarea2">
            <button class="btn button2" data-value="7">
                <span class="shift-label">OCT</span>
                <span class="alpha-label">N</span>
                <span class="main-label">7</span>
            </button>
            <button class="btn button2" data-value="8">
                <span class="shift-label">BIN</span>
                <span class="alpha-label">O</span>
                <span class="main-label">8</span>
            </button>
            <button class="btn button2" data-value="9">
                <span class="shift-label">HEX</span>
                <span class="alpha-label">P</span>
                <span class="main-label">9</span>
            </button>
            <button class="btn button2" id="del" data-action="del">
                <span class="main-label">DEL</span>
            </button>
            <button class="btn button2" id="ac" data-action="ac">
                <span class="main-label">AC</span>
            </button>
            
            <button class="btn button2" data-value="4">
                <span class="alpha-label">Q</span>
                <span class="main-label">4</span>
            </button>
            <button class="btn button2" data-value="5">
                <span class="alpha-label">R</span>
                <span class="main-label">5</span>
            </button>
            <button class="btn button2" data-value="6">
                <span class="alpha-label">S</span>
                <span class="main-label">6</span>
            </button>
            <button class="btn button2" data-action="mul">
                <span class="shift-label">nPr</span>
                <span class="alpha-label">T</span>
                <span class="main-label">×</span>
            </button>
            <button class="btn button2" data-action="div">
                <span class="shift-label">nCr</span>
                <span class="alpha-label">U</span>
                <span class="main-label">÷</span>
            </button>
            
            <button class="btn button2" data-value="1">
                <span class="alpha-label">V</span>
                <span class="main-label">1</span>
            </button>
            <button class="btn button2" data-value="2">
                <span class="alpha-label">W</span>
                <span class="main-label">2</span>
            </button>
            <button class="btn button2" data-value="3">
                <span class="alpha-label">X</span>
                <span class="main-label">3</span>
            </button>
            <button class="btn button2" data-action="add">
                <span class="alpha-label">Y</span>
                <span class="main-label">+</span>
            </button>
            <button class="btn button2" data-action="sub">
                <span class="alpha-label">Z</span>
                <span class="main-label">−</span>
            </button>
            
            <button class="btn button2" data-value="0">
                <span class="shift-label"> Ran#</span>
                <span class="alpha-label">θ</span>
                <span class="main-label">0</span>
            </button>
            <button class="btn button2" data-value=".">
                <span class="shift-label">π</span>
                <span class="alpha-label">r</span>
                <span class="main-label">.</span>
            </button>
            <button class="btn button2" data-action="exp">
                <span class="shift-label">e</span>
                <span class="alpha-label">i</span>
                <span class="main-label">×10ˣ</span>
            </button>
            <button class="btn button2" data-action="ans">
                <span class="shift-label">DRG▶</span>
                <span class="main-label">Ans</span>
            </button>
            <button class="btn button2" data-action="equals">
                <span class="main-label">EXE</span>
            </button>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
